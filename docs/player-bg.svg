<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <style>
      .ply { fill: #d4a743; opacity: 0.07; }
    </style>
    <!-- 1. Running with ball (left profile) -->
    <g id="run1" class="ply">
      <ellipse cx="0" cy="-18" rx="6" ry="7.5"/>
      <path d="M-4,-9 L5,-9 L7,12 L-5,12 Z"/>
      <path d="M-3,-6 L-12,-10 L-14,-8 L-6,-3" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M5,-6 L14,-8 L16,-6 L7,-2" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,12 L-10,24 L-8,27 L-1,20" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M5,12 L12,22 L11,25 L3,18" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <circle cx="17" cy="-5" r="4" fill="none" stroke="#d4a743" stroke-width="2.5"/>
    </g>
    <!-- 2. Kicking ball -->
    <g id="kick" class="ply">
      <ellipse cx="0" cy="-17" rx="5.5" ry="7"/>
      <path d="M-4,-8 L4,-8 L6,11 L-5,11 Z"/>
      <path d="M-3,-5 L-10,-9 L-12,-7 L-5,-2" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M4,-5 L11,-7" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,11 L-8,22 L-7,25 L-2,19" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M4,11 L16,5 L18,8 L8,14" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <circle cx="20" cy="-2" r="4.5" fill="none" stroke="#d4a743" stroke-width="2.5"/>
    </g>
    <!-- 3. Arms up celebration -->
    <g id="celebrate" class="ply">
      <ellipse cx="0" cy="-17" rx="5.5" ry="7"/>
      <path d="M-4,-8 L4,-8 L5.5,11 L-4.5,11 Z"/>
      <path d="M-4,-5 L-14,-14 L-17,-12 L-7,-3" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M4,-5 L14,-14 L17,-12 L7,-3" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,11 L-9,22 L-8,25 L-2,19" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M4,11 L9,22 L8,25 L2,19" fill="none" stroke="#d4a743" stroke-width="3.5"/>
    </g>
    <!-- 4. Sprinting -->
    <g id="sprint" class="ply">
      <ellipse cx="0" cy="-17" rx="5" ry="7"/>
      <path d="M-3,-8 L3,-8 L5,11 L-4,11 Z"/>
      <path d="M-3,-5 L-13,-7 L-15,-5 L-5,-2" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M3,-5 L13,-6" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,11 L-13,20 L-12,23 L-4,17" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M4,11 L14,18 L13,21 L4,15" fill="none" stroke="#d4a743" stroke-width="3.5"/>
    </g>
    <!-- 5. Dribbling -->
    <g id="dribble" class="ply">
      <ellipse cx="0" cy="-17" rx="5.5" ry="7"/>
      <path d="M-3,-8 L3,-8 L5,11 L-4,11 Z"/>
      <path d="M-3,-5 L-11,-8" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M3,-5 L11,-7 L13,-5 L5,-1" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,11 L-11,20 L-10,23 L-2,17" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M4,11 L8,21 L7,24 L2,18" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <circle cx="12" cy="-4" r="4" fill="none" stroke="#d4a743" stroke-width="2.5"/>
    </g>
    <!-- 6. Header / Jumping -->
    <g id="header" class="ply">
      <ellipse cx="0" cy="-20" rx="5.5" ry="7"/>
      <path d="M-3,-11 L3,-11 L4,8 L-4,8 Z"/>
      <path d="M-3,-8 L-12,-12" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M3,-8 L12,-12" fill="none" stroke="#d4a743" stroke-width="3"/>
      <path d="M-4,8 L-10,18 L-9,21 L-2,15" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <path d="M3,8 L6,18 L5,21 L1,15" fill="none" stroke="#d4a743" stroke-width="3.5"/>
      <circle cx="0" cy="-28" r="4.5" fill="none" stroke="#d4a743" stroke-width="2.5"/>
    </g>
  </defs>
  <rect width="1920" height="1080" fill="transparent"/>
  <!-- Top row -->
  <use href="#run1" x="120" y="80" transform="scale(7)" opacity="0.08"/>
  <use href="#kick" x="350" y="60" transform="scale(6.5)" opacity="0.06"/>
  <use href="#celebrate" x="580" y="90" transform="scale(8)" opacity="0.09"/>
  <use href="#sprint" x="820" y="70" transform="scale(7)" opacity="0.07"/>
  <use href="#dribble" x="1060" y="100" transform="scale(6.5)" opacity="0.06"/>
  <use href="#header" x="1280" y="50" transform="scale(7)" opacity="0.08"/>
  <use href="#run1" x="1500" y="80" transform="scale(7.5)" opacity="0.07"/>
  <use href="#kick" x="1720" y="70" transform="scale(6)" opacity="0.05"/>
  <!-- Middle scattered -->
  <use href="#dribble" x="250" y="300" transform="scale(5.5)" opacity="0.04"/>
  <use href="#celebrate" x="700" y="280" transform="scale(6)" opacity="0.05"/>
  <use href="#sprint" x="1100" y="320" transform="scale(5.5)" opacity="0.04"/>
  <use href="#header" x="1550" y="290" transform="scale(6)" opacity="0.05"/>
  <!-- Bottom row (very subtle) -->
  <use href="#run1" x="100" y="550" transform="scale(5)" opacity="0.03"/>
  <use href="#kick" x="450" y="580" transform="scale(5.5)" opacity="0.04"/>
  <use href="#celebrate" x="800" y="560" transform="scale(5)" opacity="0.03"/>
  <use href="#dribble" x="1150" y="590" transform="scale(5.5)" opacity="0.04"/>
  <use href="#run1" x="1500" y="570" transform="scale(5)" opacity="0.03"/>
  <use href="#sprint" x="1750" y="550" transform="scale(5.5)" opacity="0.04"/>
</svg>
