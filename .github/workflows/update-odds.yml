name: 每周更新世界杯赔率数据

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-odds:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行数据采集
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd scraper
          python3 fetch_odds.py

      - name: 提交数据更新
        run: |
          git config user.name "世界杯赔率机器人"
          git config user.email "bot@worldcup-2026-odds"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "🔄 每周赔率更新 $(date +'%Y-%m-%d')"
          git push
